<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-visual">
  <meta name="color-scheme" content="light">
  <title>Note</title>
  <link
    id="favicon"
    rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%8F%EF%B8%8F%3C/text%3E%3C/svg%3E"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <div class="page-grid top-row">
      <div aria-hidden="true"></div>
      <div class="top-actions">
        <button id="copy-link-button" class="button button-secondary" type="button">Copy link</button>
        <button id="new-note-button" class="button button-secondary" type="button">New note</button>
      </div>
    </div>

    <header class="page-grid note-header">
      <div class="icon-column">
        <button id="icon-button" class="note-icon-button" type="button" aria-label="Change note icon">✏️</button>
        <div id="icon-picker" class="icon-picker" hidden></div>
      </div>

      <input
        id="note-title"
        class="note-title"
        type="text"
        value="Note"
        placeholder="Untitled"
        autocomplete="off"
        spellcheck="true"
        aria-label="Note title"
      >
    </header>

    <section class="page-grid editor-row">
      <div aria-hidden="true"></div>
      <div class="editor-column">
        <div
          id="editor"
          class="editor"
          contenteditable="true"
          role="textbox"
          aria-multiline="true"
          aria-label="Note body"
          data-placeholder="Type '/' for commands"
          spellcheck="true"
        ></div>
      </div>
    </section>
  </main>

  <div id="block-menu" class="block-menu" hidden role="menu" aria-label="Block menu"></div>
  <div id="inline-toolbar" class="inline-toolbar" hidden role="toolbar" aria-label="Text formatting">
    <button type="button" data-inline-command="bold" aria-label="Bold"><strong>B</strong></button>
    <button type="button" data-inline-command="italic" aria-label="Italic"><em>I</em></button>
    <button type="button" data-inline-command="strikeThrough" aria-label="Strikethrough"><s>S</s></button>
    <button type="button" data-inline-command="highlight" aria-label="Highlight">Highlight</button>
    <button type="button" data-inline-command="createLink" aria-label="Add link">Link</button>
    <button type="button" data-inline-command="removeFormat" aria-label="Clear formatting">Clear</button>
  </div>

  <div id="toast" class="toast" hidden role="status" aria-live="polite"></div>

  <script src="storage.js" defer></script>
  <script src="editor.js" defer></script>
  <script src="ui.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
