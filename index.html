<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <meta
        name="description"
        content="Note-U is a lightweight note editor stored entirely inside the URL."
    >

    <meta
        name="theme-color"
        content="#f7f7f5"
    >

    <title>📝 Note · Note-U</title>

    <link
        id="app-favicon"
        rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📝%3C/text%3E%3C/svg%3E"
    >

    <link
        rel="stylesheet"
        href="style.css"
    >

    <script
        src="storage.js"
        defer
    ></script>

    <script
        src="editor.js"
        defer
    ></script>

    <script
        src="ui.js"
        defer
    ></script>

    <script
        src="app.js"
        defer
    ></script>
</head>

<body>
    <div
        id="app"
        class="app"
        data-loading="true"
    >
        <header
            id="topbar"
            class="topbar"
        >
            <div class="topbar__inner">
                <a
                    class="brand"
                    href="./"
                    aria-label="Open Note-U"
                >
                    <span
                        class="brand__mark"
                        aria-hidden="true"
                    >
                        N
                    </span>

                    <span class="brand__name">
                        Note-U
                    </span>
                </a>

                <div class="topbar__status">
                    <span
                        id="save-status"
                        class="save-status"
                        data-state="idle"
                        role="status"
                        aria-live="polite"
                    >
                        Ready
                    </span>
                </div>

                <div class="topbar__actions">
                    <button
                        id="copy-link-button"
                        class="button button--secondary"
                        type="button"
                    >
                        <span
                            class="button__icon"
                            aria-hidden="true"
                        >
                            🔗
                        </span>

                        <span class="button__label">
                            Copy link
                        </span>
                    </button>

                    <button
                        id="new-note-button"
                        class="button button--primary"
                        type="button"
                    >
                        <span
                            class="button__icon"
                            aria-hidden="true"
                        >
                            ＋
                        </span>

                        <span class="button__label">
                            New note
                        </span>
                    </button>
                </div>
            </div>
        </header>

        <main class="workspace">
            <article
                id="document"
                class="document"
                aria-label="Note-U document"
            >
                <header class="document-header">
                    <div class="document-icon-wrapper">
                        <button
                            id="document-icon-button"
                            class="document-icon-button"
                            type="button"
                            aria-label="Change note icon"
                            aria-haspopup="dialog"
                            aria-expanded="false"
                            aria-controls="emoji-popover"
                        >
                            <span
                                id="document-icon"
                                class="document-icon"
                                aria-hidden="true"
                            >
                                📝
                            </span>
                        </button>
                    </div>

                    <textarea
                        id="document-title"
                        class="document-title"
                        rows="1"
                        maxlength="180"
                        placeholder="Untitled note"
                        aria-label="Note title"
                        spellcheck="true"
                    >Note</textarea>
                </header>

                <section
                    id="editor"
                    class="editor"
                    aria-label="Note content"
                >
                    <div
                        id="block-list"
                        class="block-list"
                    ></div>

                    <button
                        id="add-block-button"
                        class="add-block-button"
                        type="button"
                    >
                        <span
                            class="add-block-button__icon"
                            aria-hidden="true"
                        >
                            ＋
                        </span>

                        <span class="add-block-button__label">
                            Add a block
                        </span>
                    </button>
                </section>
            </article>
        </main>

        <footer class="footer">
            <p class="footer__text">
                This note is stored directly inside its link.
            </p>
        </footer>

        <div
            id="emoji-popover"
            class="popover emoji-popover"
            role="dialog"
            aria-label="Select an icon"
            hidden
        >
            <div class="popover__header">
                <strong class="popover__title">
                    Note icon
                </strong>

                <button
                    id="close-emoji-popover-button"
                    class="icon-button"
                    type="button"
                    aria-label="Close icon picker"
                >
                    ×
                </button>
            </div>

            <div
                id="emoji-grid"
                class="emoji-grid"
                role="list"
            ></div>
        </div>

        <div
            id="block-menu"
            class="popover block-menu"
            role="menu"
            aria-label="Block actions"
            hidden
        >
            <button
                class="block-menu__item"
                type="button"
                role="menuitem"
                data-block-action="turn-into"
            >
                <span
                    class="block-menu__item-icon"
                    aria-hidden="true"
                >
                    ↔
                </span>

                <span class="block-menu__item-label">
                    Turn into
                </span>

                <span
                    class="block-menu__item-shortcut"
                    aria-hidden="true"
                >
                    ›
                </span>
            </button>

            <button
                class="block-menu__item"
                type="button"
                role="menuitem"
                data-block-action="duplicate"
            >
                <span
                    class="block-menu__item-icon"
                    aria-hidden="true"
                >
                    ⧉
                </span>

                <span class="block-menu__item-label">
                    Duplicate
                </span>
            </button>

            <button
                class="block-menu__item"
                type="button"
                role="menuitem"
                data-block-action="move-up"
            >
                <span
                    class="block-menu__item-icon"
                    aria-hidden="true"
                >
                    ↑
                </span>

                <span class="block-menu__item-label">
                    Move up
                </span>
            </button>

            <button
                class="block-menu__item"
                type="button"
                role="menuitem"
                data-block-action="move-down"
            >
                <span
                    class="block-menu__item-icon"
                    aria-hidden="true"
                >
                    ↓
                </span>

                <span class="block-menu__item-label">
                    Move down
                </span>
            </button>

            <div
                class="block-menu__separator"
                role="separator"
            ></div>

            <button
                class="block-menu__item block-menu__item--danger"
                type="button"
                role="menuitem"
                data-block-action="delete"
            >
                <span
                    class="block-menu__item-icon"
                    aria-hidden="true"
                >
                    🗑
                </span>

                <span class="block-menu__item-label">
                    Delete
                </span>
            </button>
        </div>

        <div
            id="block-type-menu"
            class="popover block-type-menu"
            role="menu"
            aria-label="Select block type"
            hidden
        >
            <div class="block-type-menu__header">
                <span class="block-type-menu__title">
                    Block type
                </span>
            </div>

            <div
                id="block-type-menu-list"
                class="block-type-menu__list"
            >
                <button
                    class="block-type-menu__item"
                    type="button"
                    role="menuitem"
                    data-block-type="paragraph"
                >
                    <span
                        class="block-type-menu__icon"
                        aria-hidden="true"
                    >
                        T
                    </span>

                    <span class="block-type-menu__content">
                        <strong class="block-type-menu__name">
                            Text
                        </strong>

                        <span class="block-type-menu__description">
                            Plain text block
                        </span>
                    </span>
                </button>

                <button
                    class="block-type-menu__item"
                    type="button"
                    role="menuitem"
                    data-block-type="heading-1"
                >
                    <span
                        class="block-type-menu__icon"
                        aria-hidden="true"
                    >
                        H1
                    </span>

                    <span class="block-type-menu__content">
                        <strong class="block-type-menu__name">
                            Heading 1
                        </strong>

                        <span class="block-type-menu__description">
                            Large section heading
                        </span>
                    </span>
                </button>

                <button
                    class="block-type-menu__item"
                    type="button"
                    role="menuitem"
                    data-block-type="heading-2"
                >
                    <span
                        class="block-type-menu__icon"
                        aria-hidden="true"
                    >
                        H2
                    </span>

                    <span class="block-type-menu__content">
                        <strong class="block-type-menu__name">
                            Heading 2
                        </strong>

                        <span class="block-type-menu__description">
                            Medium section heading
                        </span>
                    </span>
                </button>

                <button
                    class="block-type-menu__item"
                    type="button"
                    role="menuitem"
                    data-block-type="bullet-list"
                >
                    <span
                        class="block-type-menu__icon"
                        aria-hidden="true"
                    >
                        •
                    </span>

                    <span class="block-type-menu__content">
                        <strong class="block-type-menu__name">
                            Bulleted list
                        </strong>

                        <span class="block-type-menu__description">
                            List with bullet points
                        </span>
                    </span>
                </button>

                <button
                    class="block-type-menu__item"
                    type="button"
                    role="menuitem"
                    data-block-type="numbered-list"
                >
                    <span
                        class="block-type-menu__icon"
                        aria-hidden="true"
                    >
                        1.
                    </span>

                    <span class="block-type-menu__content">
                        <strong class="block-type-menu__name">
                            Numbered list
                        </strong>

                        <span class="block-type-menu__description">
                            Ordered list of items
                        </span>
                    </span>
                </button>

                <button
                    class="block-type-menu__item"
                    type="button"
                    role="menuitem"
                    data-block-type="checklist"
                >
                    <span
                        class="block-type-menu__icon"
                        aria-hidden="true"
                    >
                        ☑
                    </span>

                    <span class="block-type-menu__content">
                        <strong class="block-type-menu__name">
                            Checklist
                        </strong>

                        <span class="block-type-menu__description">
                            Track completed tasks
                        </span>
                    </span>
                </button>

                <button
                    class="block-type-menu__item"
                    type="button"
                    role="menuitem"
                    data-block-type="quote"
                >
                    <span
                        class="block-type-menu__icon"
                        aria-hidden="true"
                    >
                        “
                    </span>

                    <span class="block-type-menu__content">
                        <strong class="block-type-menu__name">
                            Quote
                        </strong>

                        <span class="block-type-menu__description">
                            Highlighted quotation
                        </span>
                    </span>
                </button>

                <button
                    class="block-type-menu__item"
                    type="button"
                    role="menuitem"
                    data-block-type="divider"
                >
                    <span
                        class="block-type-menu__icon"
                        aria-hidden="true"
                    >
                        —
                    </span>

                    <span class="block-type-menu__content">
                        <strong class="block-type-menu__name">
                            Divider
                        </strong>

                        <span class="block-type-menu__description">
                            Horizontal separator
                        </span>
                    </span>
                </button>
            </div>
        </div>

        <div
            id="slash-menu"
            class="popover slash-menu"
            role="dialog"
            aria-label="Block commands"
            hidden
        >
            <div class="slash-menu__search">
                <span
                    class="slash-menu__search-icon"
                    aria-hidden="true"
                >
                    ⌕
                </span>

                <input
                    id="slash-menu-search"
                    class="slash-menu__search-input"
                    type="text"
                    autocomplete="off"
                    spellcheck="false"
                    placeholder="Search block types"
                    aria-label="Search block types"
                >
            </div>

            <div
                id="slash-menu-list"
                class="slash-menu__list"
                role="menu"
            ></div>

            <div
                id="slash-menu-empty"
                class="slash-menu__empty"
                hidden
            >
                No commands found
            </div>
        </div>

        <div
            id="toast-region"
            class="toast-region"
            role="status"
            aria-live="polite"
            aria-atomic="true"
        ></div>

        <template id="block-template">
            <div
                class="block"
                data-block-type="paragraph"
            >
                <div class="block__controls">
                    <button
                        class="block__add-button"
                        type="button"
                        aria-label="Add a block below"
                        title="Add a block below"
                    >
                        ＋
                    </button>

                    <button
                        class="block__handle"
                        type="button"
                        aria-label="Open block menu"
                        aria-haspopup="menu"
                        aria-expanded="false"
                        title="Block menu"
                    >
                        ⠿
                    </button>
                </div>

                <div class="block__body">
                    <div
                        class="block__prefix"
                        aria-hidden="true"
                    ></div>

                    <div
                        class="block__content"
                        contenteditable="true"
                        role="textbox"
                        aria-multiline="true"
                        spellcheck="true"
                        data-placeholder="Type '/' for commands"
                    ></div>
                </div>
            </div>
        </template>
    </div>
</body>
</html>
