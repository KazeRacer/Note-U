<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-visual">
  <meta name="color-scheme" content="light">
  <meta name="application-version" content="0.4.2-debugged">
  <title>Note</title>
  <link
    id="favicon"
    rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%8F%EF%B8%8F%3C/text%3E%3C/svg%3E"
  >
  <style>
* {
  box-sizing: border-box;
}

:root {
  --page-width: 760px;
  --icon-column-width: 42px;
  --column-gap: 18px;
  --indent-step: 20px;
  --text-main: #37352f;
  --text-muted: rgba(55, 53, 47, 0.48);
  --text-faint: rgba(55, 53, 47, 0.28);
  --background: #ffffff;
  --hover: rgba(55, 53, 47, 0.06);
  --active: rgba(55, 53, 47, 0.09);
  --border: rgba(55, 53, 47, 0.11);
  --selection: rgba(35, 131, 226, 0.24);
  --blue: #2383e2;
  --code-background: #f7f6f3;
  --menu-shadow: 0 14px 38px rgba(15, 15, 15, 0.14), 0 2px 8px rgba(15, 15, 15, 0.07);
  --title-size: 36px;
  --title-weight: 700;
  --title-line-height: 1.15;
  --title-letter-spacing: -0.025em;
}

html {
  background: var(--background);
}

body {
  margin: 0;
  min-width: 300px;
  color: var(--text-main);
  background: var(--background);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

button,
input {
  font: inherit;
}

button {
  color: inherit;
}

::selection {
  background: var(--selection);
}

.page-shell {
  width: min(calc(100% - 32px), var(--page-width));
  margin: 0 auto;
  padding: 26px 0 120px;
}

.page-grid {
  display: grid;
  grid-template-columns: var(--icon-column-width) minmax(0, 1fr);
  column-gap: var(--column-gap);
}

.top-row {
  margin-bottom: 30px;
}

.top-actions {
  display: flex;
  justify-content: flex-end;
  gap: 7px;
}

.button {
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 6px 10px;
  cursor: pointer;
  transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
}

.button-secondary {
  color: rgba(55, 53, 47, 0.66);
  background: transparent;
  font-size: 12px;
  font-weight: 550;
}

.button:hover {
  color: var(--text-main);
  background: var(--hover);
  border-color: rgba(55, 53, 47, 0.18);
}

.note-header {
  align-items: center;
  margin-bottom: 12px;
}

.icon-column {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: flex-start;
}

.note-icon-button {
  width: 42px;
  height: 42px;
  margin: 0;
  padding: 0;
  border: 0;
  border-radius: 9px;
  background: transparent;
  cursor: pointer;
  font-size: 31px;
  line-height: 1;
  user-select: none;
}

.note-icon-button:hover,
.note-icon-button[aria-expanded="true"] {
  background: var(--hover);
}

.icon-picker {
  position: absolute;
  top: 48px;
  left: 0;
  z-index: 1000;
  display: grid;
  grid-template-columns: repeat(6, 32px);
  gap: 3px;
  padding: 8px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--background);
  box-shadow: var(--menu-shadow);
}

.icon-picker[hidden] {
  display: none;
}

.icon-picker button {
  display: grid;
  place-items: center;
  width: 32px;
  height: 32px;
  padding: 0;
  border: 0;
  border-radius: 6px;
  background: transparent;
  cursor: pointer;
  font-size: 20px;
}

.icon-picker button:hover {
  background: var(--hover);
}

.note-title,
.editor .block[data-type="heading-1"] .block-content,
.editor .toggle-title[data-title-style="heading-1"] {
  font-size: var(--title-size);
  font-weight: var(--title-weight);
  line-height: var(--title-line-height);
  letter-spacing: var(--title-letter-spacing);
}

.note-title {
  width: 100%;
  min-width: 0;
  margin: 0;
  padding: 0;
  border: 0;
  outline: 0;
  color: var(--text-main);
  background: transparent;
}

.note-title::placeholder {
  color: var(--text-faint);
}

.editor-column {
  position: relative;
}

.editor {
  position: relative;
  width: 100%;
  min-height: 62vh;
  outline: none;
  color: var(--text-main);
  font-size: 16px;
  line-height: 1.55;
  caret-color: var(--text-main);
  user-select: text;
  -webkit-user-select: text;
}

.editor.is-empty::before {
  content: attr(data-placeholder);
  position: absolute;
  top: 2px;
  left: 0;
  color: var(--text-faint);
  pointer-events: none;
}

.editor,
.editor *:not(button):not(input) {
  user-select: text;
  -webkit-user-select: text;
}

.block {
  --block-indent: 0;
  position: relative;
  display: block;
  min-height: 28px;
  margin-left: calc(var(--block-indent) * var(--indent-step));
  border-radius: 5px;
}

.block[data-indent="1"] { --block-indent: 1; }
.block[data-indent="2"] { --block-indent: 2; }
.block[data-indent="3"] { --block-indent: 3; }
.block[data-indent="4"] { --block-indent: 4; }
.block[data-indent="5"] { --block-indent: 5; }
.block[data-indent="6"] { --block-indent: 6; }
.block[data-indent="7"] { --block-indent: 7; }
.block[data-indent="8"] { --block-indent: 8; }

/*
 * Ogni livello creato con Tab usa la stessa guida del contenuto del toggle:
 * 10px fino alla linea + 10px dalla linea al testo.
 */
.block[data-indent]:not([data-indent="0"]) > .block-main {
  position: relative;
}

.block[data-indent]:not([data-indent="0"]) > .block-main::before {
  content: "";
  position: absolute;
  top: 0;
  bottom: 0;
  left: -10px;
  width: 1px;
  background: var(--border);
  pointer-events: none;
}

.block:hover > .block-handle,
.block:focus-within > .block-handle {
  opacity: 1;
}

.block-handle {
  position: absolute;
  top: 2px;
  left: -24px;
  width: 20px;
  height: 24px;
  margin: 0;
  padding: 0;
  border: 0;
  border-radius: 4px;
  color: var(--text-faint);
  background: transparent;
  cursor: grab;
  opacity: 0;
  user-select: none;
  -webkit-user-select: none;
}

.block-handle:hover,
.block-handle[aria-expanded="true"] {
  color: var(--text-main);
  background: var(--hover);
}

.block-handle:active {
  cursor: grabbing;
}

.block-main {
  min-width: 0;
}

.block-row {
  display: flex;
  align-items: flex-start;
  min-width: 0;
}

.block-content,
.toggle-title {
  min-width: 0;
  flex: 1;
  outline: none;
  overflow-wrap: anywhere;
  white-space: pre-wrap;
}

.block-content:empty::before,
.toggle-title:empty::before {
  content: "\200B";
}

.editor mark {
  padding: 0 2px;
  border-radius: 3px;
  color: inherit;
  background: #fff2ac;
}

.block[data-type="paragraph"] {
  margin-top: 2px;
  margin-bottom: 2px;
}

.block[data-type="heading-1"] {
  margin-top: 24px;
  margin-bottom: 8px;
}

.block[data-type="heading-1"]:first-child {
  margin-top: 0;
}

.block[data-type="heading-2"] {
  margin-top: 20px;
  margin-bottom: 6px;
}

.block[data-type="heading-2"] .block-content,
.toggle-title[data-title-style="heading-2"] {
  font-size: 24px;
  font-weight: 650;
  line-height: 1.25;
  letter-spacing: -0.018em;
}

.block[data-type="heading-3"] {
  margin-top: 15px;
  margin-bottom: 4px;
}

.block[data-type="heading-3"] .block-content,
.toggle-title[data-title-style="heading-3"] {
  font-size: 19px;
  font-weight: 600;
  line-height: 1.35;
  letter-spacing: -0.01em;
}

.list-marker,
.check-marker {
  flex: 0 0 20px;
  width: 20px;
  color: var(--text-main);
  text-align: left;
  user-select: none;
  -webkit-user-select: none;
}

.list-marker {
  padding-top: 1px;
}

.block[data-type="numbered-list"] .list-marker {
  flex-basis: 28px;
  width: 28px;
  padding-right: 4px;
  text-align: right;
}

.check-marker {
  display: flex;
  align-items: flex-start;
  padding-top: 4px;
}

.check-marker input {
  width: 16px;
  height: 16px;
  margin: 0;
  accent-color: var(--blue);
  cursor: pointer;
  user-select: none;
}

.block[data-checked="true"] .block-content {
  color: var(--text-muted);
  text-decoration: line-through;
}

.block[data-type="quote"] .block-main {
  margin: 4px 0;
  padding: 5px 10px;
  border-left: 3px solid rgba(55, 53, 47, 0.72);
}

.block[data-type="code"] {
  margin-top: 6px;
  margin-bottom: 6px;
}

.block[data-type="code"] .block-main {
  overflow: hidden;
  border-radius: 7px;
  background: var(--code-background);
}

.code-content {
  display: block;
  min-height: 24px;
  margin: 0;
  padding: 10px 12px;
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  font-size: 13px;
  line-height: 1.55;
  tab-size: 2;
  white-space: pre-wrap;
  overflow-wrap: normal;
}

.block[data-type="divider"] {
  min-height: 25px;
  margin-top: 5px;
  margin-bottom: 5px;
}

.block[data-type="divider"] .block-main {
  padding: 12px 0;
}

.block-divider {
  width: 100%;
  height: 1px;
  border: 0;
  background: var(--border);
}

.toggle-row {
  display: flex;
  align-items: flex-start;
  min-width: 0;
}

.toggle-caret {
  flex: 0 0 20px;
  width: 20px;
  height: 24px;
  margin: 0;
  padding: 0;
  border: 0;
  border-radius: 4px;
  color: var(--text-muted);
  background: transparent;
  cursor: pointer;
  font-size: 10px;
  transform-origin: center;
  user-select: none;
  -webkit-user-select: none;
}

.toggle-caret:hover {
  color: var(--text-main);
  background: var(--hover);
}

.block[data-open="true"] .toggle-caret {
  transform: rotate(90deg);
}

/* Allinea il triangolo al centro della prima riga, anche con titoli heading. */
.toggle-row:has(.toggle-title[data-title-style="heading-1"]) .toggle-caret {
  margin-top: 9px;
}

.toggle-row:has(.toggle-title[data-title-style="heading-2"]) .toggle-caret {
  margin-top: 3px;
}

.toggle-row:has(.toggle-title[data-title-style="heading-3"]) .toggle-caret {
  margin-top: 1px;
}

.toggle-title {
  min-height: 24px;
}

.toggle-body {
  display: none;
  margin-left: 10px;
  padding-left: 10px;
  border-left: 1px solid var(--border);
}

.block[data-open="true"] .toggle-body {
  display: block;
}

.toggle-body > .block {
  margin-left: calc(var(--block-indent) * var(--indent-step));
}

.block-menu {
  position: fixed;
  z-index: 3000;
  width: 292px;
  max-height: min(440px, calc(100vh - 24px));
  padding: 6px;
  overflow-x: hidden;
  overflow-y: auto;
  overscroll-behavior: contain;
  border: 1px solid var(--border);
  border-radius: 11px;
  background: var(--background);
  box-shadow: var(--menu-shadow);
}

.block-menu[hidden] {
  display: none;
}

.menu-section + .menu-section {
  margin-top: 5px;
  padding-top: 5px;
  border-top: 1px solid var(--border);
}

.menu-label {
  padding: 5px 8px 4px;
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.055em;
  text-transform: uppercase;
}

.menu-item {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  min-height: 40px;
  padding: 5px 7px;
  border: 0;
  border-radius: 7px;
  background: transparent;
  cursor: pointer;
  text-align: left;
}

.menu-item:hover,
.menu-item.is-selected {
  background: var(--hover);
}

.menu-icon {
  display: grid;
  flex: 0 0 30px;
  place-items: center;
  width: 30px;
  height: 30px;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: rgba(55, 53, 47, 0.75);
  background: rgba(55, 53, 47, 0.025);
  font-size: 12px;
  font-weight: 650;
  user-select: none;
}

.menu-copy {
  display: flex;
  min-width: 0;
  flex: 1;
  flex-direction: column;
}

.menu-title {
  overflow: hidden;
  font-size: 13.5px;
  font-weight: 550;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.menu-description {
  overflow: hidden;
  color: var(--text-muted);
  font-size: 11px;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.menu-chevron {
  color: var(--text-muted);
  font-size: 12px;
}

.inline-toolbar {
  position: fixed;
  z-index: 2900;
  display: flex;
  gap: 2px;
  padding: 4px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--background);
  box-shadow: var(--menu-shadow);
}

.inline-toolbar[hidden] {
  display: none;
}

.inline-toolbar button {
  min-width: 30px;
  height: 29px;
  padding: 0 7px;
  border: 0;
  border-radius: 5px;
  background: transparent;
  cursor: pointer;
  font-size: 12px;
}

.inline-toolbar button:hover {
  background: var(--hover);
}

.toast {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 4000;
  max-width: min(360px, calc(100vw - 36px));
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-main);
  background: var(--background);
  box-shadow: var(--menu-shadow);
  font-size: 12px;
}

.toast[hidden] {
  display: none;
}

.dragging {
  opacity: 0.45;
}

.drag-target-before::before,
.drag-target-after::after {
  content: "";
  position: absolute;
  right: 0;
  left: 0;
  height: 2px;
  border-radius: 2px;
  background: var(--blue);
}

.drag-target-before::before {
  top: -1px;
}

.drag-target-after::after {
  bottom: -1px;
}

@media (max-width: 700px) {
  :root {
    --icon-column-width: 38px;
    --column-gap: 12px;
    --title-size: 32px;
    --indent-step: 17px;
  }

  .page-shell {
    width: min(calc(100% - 24px), var(--page-width));
    padding-top: 16px;
  }

  .top-row {
    margin-bottom: 24px;
  }

  .note-icon-button {
    width: 38px;
    height: 38px;
    font-size: 28px;
  }

  .block-handle {
    left: -20px;
    width: 17px;
  }

  .block-menu {
    width: min(316px, calc(100vw - 20px));
  }
}

</style>
</head>
<body>
  <main class="page-shell">
    <div class="page-grid top-row">
      <div aria-hidden="true"></div>
      <div class="top-actions">
        <button id="copy-link-button" class="button button-secondary" type="button">Copy link</button>
        <button id="new-note-button" class="button button-secondary" type="button">New note</button>
      </div>
    </div>

    <header class="page-grid note-header">
      <div class="icon-column">
        <button id="icon-button" class="note-icon-button" type="button" aria-label="Change note icon">✏️</button>
        <div id="icon-picker" class="icon-picker" hidden></div>
      </div>

      <input
        id="note-title"
        class="note-title"
        type="text"
        value="Note"
        placeholder="Untitled"
        autocomplete="off"
        spellcheck="true"
        aria-label="Note title"
      >
    </header>

    <section class="page-grid editor-row">
      <div aria-hidden="true"></div>
      <div class="editor-column">
        <div
          id="editor"
          class="editor"
          contenteditable="true"
          role="textbox"
          aria-multiline="true"
          aria-label="Note body"
          data-placeholder="Type '/' for commands"
          spellcheck="true"
        ></div>
      </div>
    </section>
  </main>

  <div id="block-menu" class="block-menu" hidden role="menu" aria-label="Block menu"></div>
  <div id="inline-toolbar" class="inline-toolbar" hidden role="toolbar" aria-label="Text formatting">
    <button type="button" data-inline-command="bold" aria-label="Bold"><strong>B</strong></button>
    <button type="button" data-inline-command="italic" aria-label="Italic"><em>I</em></button>
    <button type="button" data-inline-command="strikeThrough" aria-label="Strikethrough"><s>S</s></button>
    <button type="button" data-inline-command="highlight" aria-label="Highlight">Highlight</button>
    <button type="button" data-inline-command="createLink" aria-label="Add link">Link</button>
    <button type="button" data-inline-command="removeFormat" aria-label="Clear formatting">Clear</button>
  </div>

  <div id="toast" class="toast" hidden role="status" aria-live="polite"></div>

  <script>
/* ===== storage.js ===== */
(() => {
  'use strict';

  const CURRENT_VERSION = 4;
  const DEFAULT_NOTE = Object.freeze({
    version: CURRENT_VERSION,
    title: 'Note',
    icon: '✏️',
    body: '',
    blocks: Object.freeze([])
  });

  function cloneDefaultNote() {
    return { ...DEFAULT_NOTE, blocks: [] };
  }

  function bytesToBase64Url(bytes) {
    let binary = '';
    for (let index = 0; index < bytes.length; index += 1) {
      binary += String.fromCharCode(bytes[index]);
    }

    return btoa(binary)
      .replace(/\+/g, '-')
      .replace(/\//g, '_')
      .replace(/=+$/g, '');
  }

  function base64UrlToBytes(value) {
    const base64 = value.replace(/-/g, '+').replace(/_/g, '/');
    const padding = '='.repeat((4 - (base64.length % 4)) % 4);
    const binary = atob(base64 + padding);
    const bytes = new Uint8Array(binary.length);

    for (let index = 0; index < binary.length; index += 1) {
      bytes[index] = binary.charCodeAt(index);
    }

    return bytes;
  }

  function encodeUtf8(value) {
    return bytesToBase64Url(new TextEncoder().encode(value));
  }

  function decodeUtf8(value) {
    return new TextDecoder().decode(base64UrlToBytes(value));
  }

  function sanitizeBodyHtml(html) {
    if (typeof html !== 'string' || !html.trim()) return '';

    const template = document.createElement('template');
    template.innerHTML = html;

    const blockedTags = new Set([
      'SCRIPT',
      'STYLE',
      'IFRAME',
      'OBJECT',
      'EMBED',
      'FORM',
      'META',
      'LINK'
    ]);

    const allowedDataAttributes = new Set([
      'data-type',
      'data-indent',
      'data-open',
      'data-checked',
      'data-title-style',
      'data-block-id'
    ]);

    const walker = document.createTreeWalker(
      template.content,
      NodeFilter.SHOW_ELEMENT
    );

    const elements = [];
    while (walker.nextNode()) elements.push(walker.currentNode);

    elements.forEach((element) => {
      if (blockedTags.has(element.tagName)) {
        element.remove();
        return;
      }

      [...element.attributes].forEach((attribute) => {
        const name = attribute.name.toLowerCase();
        const value = attribute.value.trim();

        if (name.startsWith('on')) {
          element.removeAttribute(attribute.name);
          return;
        }

        if (name.startsWith('data-') && !allowedDataAttributes.has(name)) {
          element.removeAttribute(attribute.name);
          return;
        }

        if (name === 'style' || name === 'id' || name === 'draggable') {
          element.removeAttribute(attribute.name);
          return;
        }

        if (name === 'href') {
          const safeProtocol = /^(https?:|mailto:|tel:|#)/i.test(value);
          if (!safeProtocol) element.removeAttribute(attribute.name);
        }
      });
    });

    return template.innerHTML;
  }


  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function normalizeMarks(marks) {
    if (Array.isArray(marks)) {
      return new Set(marks.map((mark) => typeof mark === 'string' ? mark : mark?.type).filter(Boolean));
    }

    if (marks && typeof marks === 'object') {
      return new Set(
        Object.entries(marks)
          .filter(([, enabled]) => Boolean(enabled))
          .map(([name]) => name)
      );
    }

    return new Set();
  }

  function richTextToHtml(value) {
    if (typeof value === 'string' || typeof value === 'number') {
      return escapeHtml(value).replace(/\n/g, '<br>');
    }

    if (!Array.isArray(value)) {
      if (value && typeof value === 'object') {
        return richTextToHtml(
          value.segments
          ?? value.richText
          ?? value.content
          ?? value.text
          ?? value.value
          ?? ''
        );
      }
      return '';
    }

    return value.map((segment) => {
      if (typeof segment === 'string' || typeof segment === 'number') {
        return escapeHtml(segment).replace(/\n/g, '<br>');
      }

      const text = escapeHtml(
        segment?.text
        ?? segment?.value
        ?? segment?.content
        ?? segment?.plainText
        ?? ''
      ).replace(/\n/g, '<br>');

      const marks = normalizeMarks(segment?.marks ?? segment?.styles ?? segment?.format);
      let html = text;

      if (marks.has('code') || marks.has('inline-code')) html = `<code>${html}</code>`;
      if (marks.has('bold') || marks.has('strong')) html = `<strong>${html}</strong>`;
      if (marks.has('italic') || marks.has('em')) html = `<em>${html}</em>`;
      if (marks.has('strike') || marks.has('strikethrough')) html = `<s>${html}</s>`;
      if (marks.has('highlight') || marks.has('mark')) html = `<mark>${html}</mark>`;

      const href = segment?.href ?? segment?.url ?? segment?.link?.href ?? segment?.link;
      if (typeof href === 'string' && /^(https?:|mailto:|tel:)/i.test(href)) {
        html = `<a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">${html}</a>`;
      }

      return html;
    }).join('');
  }

  function mapLegacyBlockType(type) {
    const normalized = String(type || 'paragraph').toLowerCase();
    const mappings = {
      paragraph: 'paragraph',
      text: 'paragraph',
      'heading-1': 'heading-1',
      heading1: 'heading-1',
      h1: 'heading-1',
      'heading-2': 'heading-2',
      heading2: 'heading-2',
      h2: 'heading-2',
      'heading-3': 'heading-3',
      heading3: 'heading-3',
      h3: 'heading-3',
      'bullet-list': 'bulleted-list',
      'bulleted-list': 'bulleted-list',
      bullet: 'bulleted-list',
      ul: 'bulleted-list',
      'number-list': 'numbered-list',
      'numbered-list': 'numbered-list',
      numbered: 'numbered-list',
      ol: 'numbered-list',
      checklist: 'checklist',
      todo: 'checklist',
      'to-do': 'checklist',
      toggle: 'toggle',
      dropdown: 'toggle',
      quote: 'quote',
      blockquote: 'quote',
      divider: 'divider',
      hr: 'divider',
      code: 'code',
      'code-block': 'code'
    };
    return mappings[normalized] || 'paragraph';
  }

  function legacyBlockContent(block) {
    return richTextToHtml(
      block?.segments
      ?? block?.richText
      ?? block?.content
      ?? block?.text
      ?? block?.value
      ?? ''
    ) || '<br>';
  }

  function blockShell(type, indent, id, mainHtml, extraAttributes = '') {
    return `
      <div class="block" data-type="${type}" data-indent="${indent}" data-block-id="${escapeHtml(id)}" ${extraAttributes}>
        <button type="button" class="block-handle" tabindex="-1" contenteditable="false" data-drag-handle="true" aria-label="Block actions">⋮⋮</button>
        <div class="block-main">${mainHtml}</div>
      </div>
    `.trim();
  }

  function legacyBlockToHtml(block, index = 0) {
    const type = mapLegacyBlockType(block?.type ?? block?.kind ?? block?.blockType);
    const indent = Math.max(0, Math.min(8, Number.parseInt(block?.indent ?? block?.depth ?? block?.level ?? 0, 10) || 0));
    const id = block?.id || `legacy-${index}`;
    const content = legacyBlockContent(block);

    if (type === 'divider') {
      return blockShell(type, indent, id, '<hr class="block-divider" contenteditable="false">');
    }

    if (type === 'toggle') {
      const title = richTextToHtml(
        block?.title
        ?? block?.titleSegments
        ?? block?.summary
        ?? block?.content
        ?? block?.text
        ?? ''
      ) || '<br>';
      const titleStyle = mapLegacyBlockType(block?.titleStyle || 'paragraph');
      const open = block?.open === false ? 'false' : 'true';
      const children = block?.children ?? block?.blocks ?? block?.body ?? [];
      const childHtml = Array.isArray(children)
        ? children.map((child, childIndex) => legacyBlockToHtml(child, childIndex)).join('')
        : '';

      return blockShell(
        type,
        indent,
        id,
        `<div class="toggle-row"><button type="button" class="toggle-caret" tabindex="-1" contenteditable="false" data-toggle-caret="true" aria-label="Toggle content">▶</button><div class="toggle-title" data-block-content="true" data-title-style="${titleStyle}">${title}</div></div><div class="toggle-body" data-toggle-body="true">${childHtml}</div>`,
        `data-open="${open}"`
      );
    }

    if (type === 'code') {
      const plainText = block?.text ?? block?.content ?? block?.value ?? '';
      return blockShell(type, indent, id, `<pre class="block-content code-content" data-block-content="true">${escapeHtml(Array.isArray(plainText) ? plainText.map((segment) => segment?.text ?? segment?.value ?? '').join('') : plainText)}</pre>`);
    }

    let prefix = '';
    let extraAttributes = '';

    if (type === 'bulleted-list') {
      prefix = '<span class="list-marker" contenteditable="false" aria-hidden="true">•</span>';
    } else if (type === 'numbered-list') {
      prefix = '<span class="list-marker" contenteditable="false" aria-hidden="true">1.</span>';
    } else if (type === 'checklist') {
      const checked = Boolean(block?.checked ?? block?.done ?? block?.completed);
      prefix = `<label class="check-marker" contenteditable="false"><input type="checkbox" aria-label="Complete item" ${checked ? 'checked' : ''}></label>`;
      extraAttributes = `data-checked="${checked ? 'true' : 'false'}"`;
    }

    return blockShell(
      type,
      indent,
      id,
      `<div class="block-row">${prefix}<div class="block-content" data-block-content="true">${content}</div></div>`,
      extraAttributes
    );
  }

  function structuredBlocksToHtml(blocks) {
    if (!Array.isArray(blocks)) return '';
    return blocks.map((block, index) => legacyBlockToHtml(block, index)).join('');
  }

  function sanitizeInlineHtml(html) {
    if (typeof html !== 'string' || !html.trim()) return '';

    const template = document.createElement('template');
    template.innerHTML = html;

    const allowedTags = new Set([
      'A', 'BR', 'STRONG', 'B', 'EM', 'I', 'S', 'STRIKE', 'MARK', 'CODE', 'SPAN'
    ]);
    const elements = [...template.content.querySelectorAll('*')];

    elements.forEach((element) => {
      if (!allowedTags.has(element.tagName)) {
        element.replaceWith(...element.childNodes);
        return;
      }

      [...element.attributes].forEach((attribute) => {
        const name = attribute.name.toLowerCase();
        if (element.tagName !== 'A' || !['href', 'target', 'rel'].includes(name)) {
          element.removeAttribute(attribute.name);
        }
      });

      if (element.tagName === 'A') {
        const href = element.getAttribute('href') || '';
        if (!/^(https?:|mailto:|tel:|#)/i.test(href)) {
          element.removeAttribute('href');
        } else {
          element.setAttribute('target', '_blank');
          element.setAttribute('rel', 'noopener noreferrer');
        }
      }
    });

    return template.innerHTML;
  }

  const BLOCK_TYPE_CODES = Object.freeze({
    paragraph: 'p',
    'heading-1': 'h1',
    'heading-2': 'h2',
    'heading-3': 'h3',
    'bulleted-list': 'ul',
    'numbered-list': 'ol',
    checklist: 'ck',
    toggle: 'tg',
    quote: 'q',
    divider: 'hr',
    code: 'cd'
  });

  const CODE_BLOCK_TYPES = Object.freeze(
    Object.fromEntries(Object.entries(BLOCK_TYPE_CODES).map(([type, code]) => [code, type]))
  );

  function normalizeBlock(block) {
    if (!block || typeof block !== 'object') {
      return { type: 'paragraph', indent: 0, html: '' };
    }

    const rawType = block.type ?? block.kind ?? block.blockType ?? block.t;
    const type = CODE_BLOCK_TYPES[rawType] || mapLegacyBlockType(rawType);
    const indent = Math.max(
      0,
      Math.min(8, Number.parseInt(block.indent ?? block.depth ?? block.level ?? block.i ?? 0, 10) || 0)
    );

    if (type === 'divider') {
      return { type, indent };
    }

    if (type === 'code') {
      const value = block.text ?? block.value ?? block.v ?? block.content ?? '';
      const text = Array.isArray(value)
        ? value.map((segment) => segment?.text ?? segment?.value ?? segment?.content ?? '').join('')
        : String(value ?? '');
      return { type, indent, text };
    }

    if (type === 'toggle') {
      const rawTitleStyle = block.titleStyle ?? block.s ?? 'paragraph';
      const titleStyle = CODE_BLOCK_TYPES[rawTitleStyle] || mapLegacyBlockType(rawTitleStyle);
      const rawChildren = block.children ?? block.blocks ?? block.body ?? block.b ?? [];
      const rawTitle = block.title
        ?? block.titleSegments
        ?? block.summary
        ?? block.html
        ?? block.h
        ?? block.content
        ?? block.text
        ?? '';

      return {
        type,
        indent,
        html: sanitizeInlineHtml(
          typeof rawTitle === 'string' ? rawTitle : richTextToHtml(rawTitle)
        ),
        titleStyle: ['paragraph', 'heading-1', 'heading-2', 'heading-3'].includes(titleStyle)
          ? titleStyle
          : 'paragraph',
        open: block.open !== false && block.o !== 0,
        children: normalizeBlocks(Array.isArray(rawChildren) ? rawChildren : [])
      };
    }

    const rawHtml = block.html ?? block.h;
    const html = typeof rawHtml === 'string'
      ? sanitizeInlineHtml(rawHtml)
      : sanitizeInlineHtml(legacyBlockContent(block));

    return {
      type,
      indent,
      html,
      ...(type === 'checklist'
        ? { checked: Boolean(block.checked ?? block.done ?? block.completed ?? block.x) }
        : {})
    };
  }

  function normalizeBlocks(blocks) {
    if (!Array.isArray(blocks)) return [];
    return blocks.map(normalizeBlock);
  }

  function compactBlock(block) {
    const normalized = normalizeBlock(block);
    const compact = { t: BLOCK_TYPE_CODES[normalized.type] || 'p' };

    if (normalized.indent > 0) compact.i = normalized.indent;

    if (normalized.type === 'divider') return compact;

    if (normalized.type === 'code') {
      if (normalized.text) compact.v = normalized.text;
      return compact;
    }

    if (normalized.html) compact.h = normalized.html;

    if (normalized.type === 'checklist' && normalized.checked) {
      compact.x = 1;
    }

    if (normalized.type === 'toggle') {
      if (normalized.titleStyle && normalized.titleStyle !== 'paragraph') {
        compact.s = BLOCK_TYPE_CODES[normalized.titleStyle] || 'p';
      }
      if (normalized.open === false) compact.o = 0;
      if (normalized.children?.length) compact.b = normalized.children.map(compactBlock);
    }

    return compact;
  }

  function normalizeNote(value) {
    if (!value || typeof value !== 'object') return cloneDefaultNote();

    const rawBlocks = Array.isArray(value.blocks)
      ? value.blocks
      : Array.isArray(value.b)
        ? value.b
        : [];

    return {
      version: CURRENT_VERSION,
      title: typeof value.title === 'string'
        ? value.title
        : typeof value.t === 'string'
          ? value.t
          : DEFAULT_NOTE.title,
      icon: typeof value.icon === 'string'
        ? value.icon
        : typeof value.e === 'string'
          ? value.e
          : DEFAULT_NOTE.icon,
      body: sanitizeBodyHtml(
        typeof value.body === 'string'
          ? value.body
          : typeof value.b === 'string'
            ? value.b
            : ''
      ),
      blocks: normalizeBlocks(rawBlocks)
    };
  }

  function parseJsonPayload(raw) {
    const parsed = JSON.parse(raw);
    return normalizeNote(parsed);
  }

  function decodeLegacyBase64(hash) {
    const normalized = hash.replace(/-/g, '+').replace(/_/g, '/');
    const padding = '='.repeat((4 - (normalized.length % 4)) % 4);
    const binary = atob(normalized + padding);

    try {
      const bytes = Uint8Array.from(binary, (character) => character.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    } catch {
      return decodeURIComponent(escape(binary));
    }
  }

  function loadFromHash(hash = window.location.hash) {
    const value = hash.startsWith('#') ? hash.slice(1) : hash;
    if (!value) return cloneDefaultNote();

    const attempts = [
      () => parseJsonPayload(decodeUtf8(value)),
      () => parseJsonPayload(decodeLegacyBase64(value)),
      () => parseJsonPayload(decodeURIComponent(value))
    ];

    for (const attempt of attempts) {
      try {
        return attempt();
      } catch {
        // Continue with the next legacy format.
      }
    }

    try {
      const decoded = decodeLegacyBase64(value);
      return normalizeNote({ body: decoded });
    } catch {
      try {
        return normalizeNote({ body: decodeURIComponent(value) });
      } catch {
        return cloneDefaultNote();
      }
    }
  }

  function encodeNote(note) {
    const normalized = normalizeNote(note);
    const compactPayload = {
      v: CURRENT_VERSION,
      t: normalized.title,
      e: normalized.icon,
      b: normalized.blocks.length
        ? normalized.blocks.map(compactBlock)
        : normalized.body || []
    };

    return encodeUtf8(JSON.stringify(compactPayload));
  }

  function writeToUrl(note, options = {}) {
    const { replace = true } = options;
    const encoded = encodeNote(note);
    const nextUrl = `${window.location.pathname}${window.location.search}#${encoded}`;

    if (replace) {
      history.replaceState(null, '', nextUrl);
    } else {
      history.pushState(null, '', nextUrl);
    }

    return window.location.href;
  }

  function clearUrl(options = {}) {
    const { replace = false } = options;
    const nextUrl = `${window.location.pathname}${window.location.search}`;

    if (replace) {
      history.replaceState(null, '', nextUrl);
    } else {
      history.pushState(null, '', nextUrl);
    }
  }

  window.NoteStorage = Object.freeze({
    CURRENT_VERSION,
    DEFAULT_NOTE,
    cloneDefaultNote,
    normalizeNote,
    sanitizeBodyHtml,
    sanitizeInlineHtml,
    normalizeBlocks,
    loadFromHash,
    encodeNote,
    writeToUrl,
    clearUrl
  });
})();
